version: 2

# Keep GitHub Actions pinned to commit SHAs up to date. The release workflow
# (`.github/workflows/release.yml`) pins third-party actions by SHA rather
# than tag — without Dependabot, those pins would silently drift behind
# upstream security fixes. Weekly cadence is enough; releases are the only
# thing that depends on these pins.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      # Batch all action updates into a single PR per week. Avoids review
      # churn when many actions release together (e.g. a Node runtime bump).
      actions:
        patterns:
          - "*"
