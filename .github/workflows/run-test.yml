name: Run Test
on: push
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make test
  Mac:
    runs-on: macos-latest
    steps:
      - run: brew install libomp
      - uses: actions/checkout@v4
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make test
  Windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make test
