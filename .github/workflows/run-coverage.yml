name: Run Coverage
on:
  pull_request:
  push:
    branches: [main]
jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: hrishikesh-kadam/setup-lcov@v1
        with:
          ref: v2.4

      - name: Cache CMake deps
        uses: actions/cache@v5
        with:
          path: .coverage/_deps
          key: ${{ runner.os }}-cmake-deps-coverage-${{ hashFiles('core/Dependencies.cmake') }}

      - name: Build, test, and generate coverage report
        id: report
        run: make coverage

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          REPORT: ${{ steps.report.outputs.report }}
        with:
          script: |
            const marker = '<!-- ppforest2-coverage -->';
            const body = `${marker}\n${process.env.REPORT}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: ppforest2-coverage.json
          label: LOC Coverage
          message: ${{ steps.report.outputs.line_pct }}%
          color: brightgreen
