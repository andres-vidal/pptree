name: Run R Package Check
on: push
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-tinytex@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R/PPTree
          extra-packages: any::devtools
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make r-check
      - name: Show Install Logs
        if: failure()
        run: cat PPtree.Rcheck/00install.out
  Mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-tinytex@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R/PPTree
          extra-packages: any::devtools
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make r-check
      - name: Show Install Logs
        if: failure()
        run: cat PPtree.Rcheck/00install.out
  MacOpenMP:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-tinytex@v2
      - run: brew install libomp
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R/PPTree
          extra-packages: any::devtools
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make r-check
      - name: Show Install Logs
        if: failure()
        run: cat PPtree.Rcheck/00install.out
  Windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-tinytex@v2
        env:
          TINYTEX_INSTALLER: TinyTeX
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R/PPTree
          extra-packages: any::devtools
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make r-check
      - name: Show Install Logs
        if: failure()
        run: cat PPtree.Rcheck/00install.out
