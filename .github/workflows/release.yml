name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make test

  r-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-tinytex@v2
        env:
          TINYTEX_INSTALLER: ${{ runner.os == 'Windows' && 'TinyTeX' || '' }}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R
          extra-packages: any::devtools
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-r-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make r-check

  release:
    needs: [test, r-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify VERSION file matches tag
        run: |
          file_version=$(cat VERSION)
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "ERROR: VERSION file ($file_version) does not match tag ($tag_version)"
            exit 1
          fi
      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          awk "found && /^# ppforest2 /{exit} /^# ppforest2 ${version}/{found=1} found{print}" CHANGELOG.md > release_notes.md
          echo "Release notes:"
          cat release_notes.md
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-r-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - name: Build R package tarball
        run: |
          make r-build
          mv ppforest2_${{ steps.version.outputs.version }}.tar.gz R-ppforest2_${{ steps.version.outputs.version }}.tar.gz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
          files: R-ppforest2_${{ steps.version.outputs.version }}.tar.gz
