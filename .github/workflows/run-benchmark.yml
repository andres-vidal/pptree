name: Run Benchmark
on: pull_request
jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      BENCH_ITERATIONS: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Cache CMake deps (PR)
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}

      - name: Build PR branch
        run: make build

      - name: Run PR benchmarks
        run: |
          # Run both benchmark families on the PR branch; results used by
          # the comparison step below. Classification first (stable set),
          # regression second (experimental — flagged in the PR comment).
          .build/ppforest2 benchmark -s bench/default-scenarios-classification.json -o /tmp/pr-results-cls.json -q -i ${{ env.BENCH_ITERATIONS }}
          .build/ppforest2 benchmark -s bench/default-scenarios-regression.json    -o /tmp/pr-results-reg.json -q -i ${{ env.BENCH_ITERATIONS }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch
          clean: false

      - name: Build and benchmark base branch
        id: base
        continue-on-error: true
        run: |
          # Build and benchmark the PR's base commit against the PR's
          # scenario files — so scenario edits in the PR apply to the
          # baseline too (otherwise "scenario added in this PR" errors
          # on the base side). Copy both files over; fall through to
          # `|| true` if either is missing on the base branch (e.g. the
          # PR itself introduces the split).
          cd base-branch
          make build
          cp ../bench/default-scenarios-classification.json bench/default-scenarios-classification.json 2>/dev/null || true
          cp ../bench/default-scenarios-regression.json    bench/default-scenarios-regression.json    2>/dev/null || true
          .build/ppforest2 benchmark -s bench/default-scenarios-classification.json -o /tmp/base-results-cls.json -q -i ${{ env.BENCH_ITERATIONS }}
          .build/ppforest2 benchmark -s bench/default-scenarios-regression.json    -o /tmp/base-results-reg.json -q -i ${{ env.BENCH_ITERATIONS }}

      - name: Generate comparison
        id: comparison
        run: |
          # Build one PR comment with two sections: classification (stable)
          # and regression (experimental). Each section runs a fresh
          # comparison against the corresponding base-branch baseline. If
          # the base-branch benchmarking failed (e.g. PR introduces the
          # split), fall back to bare PR numbers plus an explanation.
          gen_section() {
            local label="$1" scenarios="$2" base_results="$3"
            local body
            if [ "${{ steps.base.outcome }}" = "success" ] && [ -s "$base_results" ]; then
              body=$(.build/ppforest2 benchmark -s "$scenarios" -b "$base_results" --format markdown -q -i ${{ env.BENCH_ITERATIONS }})
            else
              body=$(.build/ppforest2 benchmark -s "$scenarios" --format markdown -q -i ${{ env.BENCH_ITERATIONS }})
              body="${body}"$'\n\n'"_Baseline comparison skipped: base branch does not support benchmarking._"
            fi
            printf '## %s\n\n%s\n\n' "$label" "$body"
          }

          REPORT=$(gen_section "Classification benchmarks" \
            "bench/default-scenarios-classification.json" \
            "/tmp/base-results-cls.json")
          REPORT="${REPORT}"$(gen_section "Regression benchmarks (experimental)" \
            "bench/default-scenarios-regression.json" \
            "/tmp/base-results-reg.json")

          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.comparison.outputs.report }}
        with:
          script: |
            const marker = '<!-- ppforest2-benchmark -->';
            const body = `${marker}\n${process.env.REPORT}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
