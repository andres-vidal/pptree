name: Run Benchmark
on: pull_request
jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      BENCH_ITERATIONS: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Cache CMake deps (PR)
        uses: actions/cache@v4
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}

      - name: Build PR branch
        run: make build

      - name: Run PR benchmarks
        run: .build/pptree benchmark -s bench/default-scenarios.json -o /tmp/pr-results.json -q -i ${{ env.BENCH_ITERATIONS }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch
          clean: false

      - name: Build and benchmark base branch
        id: base
        continue-on-error: true
        run: |
          cd base-branch
          make build
          cp ../bench/default-scenarios.json bench/default-scenarios.json 2>/dev/null || true
          .build/pptree benchmark -s bench/default-scenarios.json -o /tmp/base-results.json -q -i ${{ env.BENCH_ITERATIONS }}

      - name: Generate comparison
        id: comparison
        run: |
          if [ "${{ steps.base.outcome }}" = "success" ]; then
            REPORT=$(.build/pptree benchmark -s bench/default-scenarios.json -b /tmp/base-results.json --format markdown -q -i ${{ env.BENCH_ITERATIONS }})
          else
            REPORT=$(.build/pptree benchmark -s bench/default-scenarios.json --format markdown -q -i ${{ env.BENCH_ITERATIONS }})
            REPORT="${REPORT}"$'\n\n'"_Baseline comparison skipped: base branch does not support benchmarking._"
          fi
          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.comparison.outputs.report }}
        with:
          script: |
            const marker = '<!-- pptree-benchmark -->';
            const body = `${marker}\n${process.env.REPORT}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
