name: Run Analyze
on:
  push:
  workflow_dispatch:
    inputs:
      clang-tidy:
        description: Run clang-tidy
        type: boolean
        default: false
jobs:
  CppCheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: make install-tools
      - run: make analyze

  Clang-Tidy:
    if: inputs.clang-tidy == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Cache CMake deps
        uses: actions/cache@v5
        with:
          path: .build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('core/Dependencies.cmake') }}
      - run: make install-tools
      - run: make tidy
